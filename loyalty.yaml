openapi: 3.0.3
info:
  title: Loyalty Program API
  description: |
    API for loyalty program management.
    Used by CBE POS terminals to identify members,
    apply discounts and vouchers, and finalize transactions.
    Basket values coming from POS are the source of truth for eligibility calculations.
    `get-member` can be called multiple times for the same receipt while the basket
    or selected vouchers change. `finalize-order` must be idempotent by `transaction_id`.
  version: 1.0.0
  contact:
    name: Mike Shumkov (Polonez.ie)
    email: mike.shumkov@polonez.ie

servers:
  - url: https://erp.polonez.ie
    description: Production server
  - url: https://odoo-stage.polonez.dev
    description: Staging server
  - url: http://localhost:8069
    description: Local server

security:
  - BearerAuth: []
    PosIdHeader: []

paths:
  /api/v1/loyalty/get-member:
    post:
      summary: Get loyalty program member data
      description: |
        Used by CBE POS when products are scanned, a loyalty QR code or phone number
        is entered, or a paper/electronic voucher is scanned. Returns member
        information, voucher validation results, and applicable discounts.
        
        **Notes:**
        - `qr_code`, `phone`, and `vouchers` are all optional; the endpoint can be called even when none of them is present yet
        - The endpoint may be called multiple times for the same receipt as the basket or selected vouchers change
        - `vouchers` can contain anonymous paper vouchers and app vouchers scanned at the POS
        - Basket prices and discounts coming from POS are the source of truth for all eligibility calculations
        - Business validation errors such as expired vouchers, missing amount thresholds, or unknown member flows should be returned in the `200` payload
      operationId: getMember
      tags:
        - Loyalty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMemberRequest'
            example:
              qr_code: "380686852536"
              phone: "+353871234567"
              vouchers:
                - "1235/k67kmd/20251115"
                - "24567/b6asnn891/20250620"
              shop_id: "0000323"
              timestamp: "2025-11-12 14:19:00"
              receipt: "007648"
              pos_id: "01"
              pos_user_id: "12"
              transaction_value: 14.00
              basket_items:
                - line_number: "1"
                  prod_code: "0000000002823"
                  product_desc: "LUNCHBOX"
                  quantity: 2
                  value: 7
                  prod_dept: "39"
                  prod_group1: "00129"
                  prod_group2: "00619"
                  vat: 1.21
                  promo_amount: 0.2
                  reduced_amount: 0
      responses:
        '200':
          description: Successful response with member data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMemberResponse'
              example:
                status: true
                member_found: true
                member_name: "John Smith"
                points_balance: 47
                discount_total: 1.00
                scanned_vouchers:
                  - code: "1235/k67kmd/20251115"
                    status: "Used"
                    applied: true
                    description: "Voucher 5 OFF 25"
                  - code: "24567/b6asnn891/20250620"
                    status: "Expired"
                    applied: false
                    description: "Birthday voucher"
                    reason_code: "VOUCHER_EXPIRED"
                    reason: "Expired"
                discounts:
                  - line_number: "1"
                    type: "voucher"
                    label: "Voucher 5 OFF 25"
                    discount: 1.00
                messages:
                  - "Welcome back, John Smith!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'


  /api/v1/loyalty/finalize-order:
    post:
      summary: Finalize transaction
      description: |
        Sent after payment is completed and before printing the final receipt.
        Used to confirm the final basket, consume eligible vouchers, award points,
        and generate any new vouchers that must be shown or printed.
        
        **Notes:**
        - `transaction_id` must be globally unique and the endpoint must be idempotent on retries
        - Repeating the same `transaction_id` must not consume vouchers twice or award points twice
        - If user is not identified, an anonymous voucher can still be returned for printing
        - `vouchers[].print = true` means the voucher should be printed on the receipt
        - Basket prices and discounts coming from POS are the source of truth for all eligibility calculations
      operationId: finalizeOrder
      tags:
        - Loyalty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeOrderRequest'
            example:
              qr_code: "380686852536"
              phone: "+353871234567"
              vouchers:
                - "1235/k67kmd/20251115"
                - "24567/b6asnn891/20250620"
              shop_id: "0000323"
              transaction_id: "doc-uuid-12345"
              timestamp: "2025-11-12 14:21:00"
              receipt: "007649"
              pos_id: "01"
              pos_user_id: "12"
              transaction_value: 13.00
              change: 0
              tenders:
                - tender_name: "CASH"
                  amount: 12.00
              basket_items:
                - line_number: "1"
                  prod_code: "0000000002823"
                  product_desc: "LUNCHBOX"
                  quantity: 2
                  value: 6
                  prod_dept: "39"
                  prod_group1: "00129"
                  prod_group2: "00619"
                  vat: 1.21
                  promo_amount: 0.2
                  reduced_amount: 0
      responses:
        '200':
          description: Successful order finalization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeOrderResponse'
              example:
                status: true
                member_found: true
                member_name: "John Smith"
                points_collected: 4
                current_points: 51
                scanned_vouchers:
                  - code: "1235/k67kmd/20251115"
                    status: "Used"
                    applied: true
                    description: "Voucher 5 OFF 25"
                  - code: "24567/b6asnn891/20250620"
                    status: "Revoked"
                    applied: false
                    description: "Birthday voucher"
                    reason_code: "LOW_PURCHASE_AMOUNT"
                    reason: "Low purchase amount"
                    missing_amount: 13.00
                vouchers:
                  - print: true
                    code: "1235/k67kmd/20251115"
                    qr_code_payload: "1235/k67kmd/20251115"
                    description: "Get €5 off your next order over €20!"
                    type: "Standard"
                    status: "Issued"
                    valid_until: "2025-11-30 23:59:59"
                messages:
                  - "4 points collected"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Authorization token for POS integration.
        Token scope can be terminal-specific, store-specific, or global.
    PosIdHeader:
      type: apiKey
      in: header
      name: X-Pos-Id
      description: POS terminal identifier. Required when a store-scoped token is used.

  schemas:
    PosTimestamp:
      type: string
      description: UTC timestamp in format YYYY-MM-DD HH:mm:ss
      pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$'
      example: "2025-11-12 14:19:00"

    VoucherLifecycleStatus:
      type: string
      description: Voucher lifecycle status in Loyalty Backend
      enum:
        - Issued
        - Active
        - Used
        - Expired
        - Revoked
      example: "Active"

    VoucherType:
      type: string
      description: Voucher type configured in Loyalty Backend
      enum:
        - Welcome
        - Birthday
        - Standard
        - Individual
      example: "Standard"

    BasketItem:
      type: object
      required:
        - line_number
        - prod_code
        - quantity
        - value
      properties:
        line_number:
          type: string
          description: Line number in the receipt
          example: "1"
        prod_code:
          type: string
          description: Product code
          example: "0000000002823"
        product_desc:
          type: string
          description: Product description
          example: "LUNCHBOX"
        quantity:
          type: number
          format: float
          description: Quantity
          minimum: 0.001
          example: 2
        value:
          type: number
          format: float
          description: Line item value
          minimum: 0
          example: 7.00
        prod_dept:
          type: string
          description: Product department
          example: "39"
        prod_group1:
          type: string
          description: Product group level 1
          example: "00129"
        prod_group2:
          type: string
          description: Product group level 2
          example: "00619"
        vat:
          type: number
          format: float
          description: VAT amount
          minimum: 0
          example: 1.21
        promo_amount:
          type: number
          format: float
          description: Promotional discount amount
          minimum: 0
          example: 0.2
        reduced_amount:
          type: number
          format: float
          description: Additional discount amount
          minimum: 0
          example: 0

    DiscountLine:
      type: object
      description: Discount that POS should apply or print on the receipt
      properties:
        line_number:
          type: string
          description: Receipt line number. Use `TOTAL` for basket-level discounts.
          example: "1"
        type:
          type: string
          description: Discount source
          enum:
            - voucher
            - staff
            - loyalty
            - promo
            - manual
          example: "voucher"
        label:
          type: string
          description: Human-readable label for POS display or receipt printing
          example: "Voucher 5 OFF 25"
        discount:
          type: number
          format: float
          description: Discount amount
          minimum: 0
          example: 1.00

    VoucherStatusResult:
      type: object
      description: Validation or final processing result for a scanned voucher
      properties:
        code:
          type: string
          description: Voucher code received from POS
          example: "1235/k67kmd/20251115"
        status:
          $ref: '#/components/schemas/VoucherLifecycleStatus'
        applied:
          type: boolean
          description: Whether the voucher affected the current calculation or final order
          example: true
        description:
          type: string
          description: Voucher description
          example: "Voucher 5 OFF 25"
        reason_code:
          type: string
          description: Machine-readable reason why the voucher was not applied
          example: "LOW_PURCHASE_AMOUNT"
        reason:
          type: string
          description: Human-readable reason why the voucher was not applied
          example: "13 euro missing for get 5 euro spent 25 euro"
        missing_amount:
          type: number
          format: float
          description: Additional spend required for voucher eligibility, when applicable
          minimum: 0
          example: 13.00
        excluded_categories:
          type: array
          description: Categories that prevented voucher eligibility, when applicable
          items:
            type: string
          example:
            - "tobacco"
            - "alcohol"

    IssuedVoucher:
      type: object
      description: Voucher generated after order finalization
      properties:
        print:
          type: boolean
          description: Whether the voucher should be printed on the receipt
          example: true
        code:
          type: string
          description: Voucher code or text payload that POS should encode as QR/barcode when printing
          example: "1235/k67kmd/20251115"
        qr_code_payload:
          type: string
          description: Optional explicit QR payload when it differs from `code`
          example: "1235/k67kmd/20251115"
        description:
          type: string
          description: Voucher description
          example: "Get €5 off your next order over €20!"
        type:
          $ref: '#/components/schemas/VoucherType'
        status:
          type: string
          description: Status of the newly generated voucher
          enum:
            - Issued
            - Active
          example: "Issued"
        valid_until:
          $ref: '#/components/schemas/PosTimestamp'

    GetMemberRequest:
      type: object
      description: |
        Request used to identify a member and recalculate discounts for the current
        basket state. The same receipt can be evaluated multiple times as the basket
        or selected vouchers change.
      required:
        - shop_id
        - timestamp
        - receipt
        - pos_id
        - transaction_value
      properties:
        qr_code:
          type: string
          description: Loyalty program member QR code
          example: "380686852536"
        phone:
          type: string
          description: Member phone number
          pattern: '^\+?[1-9]\d{1,14}$'
          example: "+353871234567"
        vouchers:
          type: array
          description: Scanned voucher codes from paper receipts or the loyalty app
          items:
            type: string
          example:
            - "1235/k67kmd/20251115"
        shop_id:
          type: string
          description: Shop identifier
          example: "0000323"
        timestamp:
          $ref: '#/components/schemas/PosTimestamp'
        receipt:
          type: string
          description: Receipt number
          example: "007648"
        pos_id:
          type: string
          description: POS terminal identifier
          example: "01"
        pos_user_id:
          type: string
          description: Cashier operator identifier
          example: "12"
        transaction_value:
          type: number
          format: float
          description: Total transaction amount
          minimum: 0
          example: 14.00
        basket_items:
          type: array
          description: List of items in the basket
          items:
            $ref: '#/components/schemas/BasketItem'

    GetMemberResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: boolean
          description: Request execution status
          example: true
        member_found:
          type: boolean
          description: |
            Whether a registered loyalty member was identified. Can be `false`
            while anonymous voucher validation still succeeds.
          example: true
        member_name:
          type: string
          description: Loyalty program member name
          example: "John Smith"
        points_balance:
          type: integer
          description: Current bonus points balance
          minimum: 0
          example: 47
        discount_total:
          type: number
          format: float
          description: Applicable discount in main currency (Euros/Pounds etc)
          minimum: 0
          example: 1.00
        scanned_vouchers:
          type: array
          description: Scanned vouchers with their application status
          items:
            $ref: '#/components/schemas/VoucherStatusResult'
        discounts:
          type: array
          description: List of applied discounts
          items:
            $ref: '#/components/schemas/DiscountLine'
        messages:
          type: array
          description: Messages to display to cashier or customer
          items:
            type: string
          example:
            - "Welcome back, John Smith!"

    Tender:
      type: object
      required:
        - tender_name
        - amount
      properties:
        tender_name:
          type: string
          description: Payment type (CASH, CARD, etc.)
          example: "CASH"
        amount:
          type: number
          format: float
          description: Payment amount
          minimum: 0
          example: 12.00

    FinalizeOrderRequest:
      type: object
      description: |
        Final basket confirmation. Repeated calls with the same `transaction_id`
        must be handled idempotently by the Loyalty Backend.
      required:
        - shop_id
        - timestamp
        - receipt
        - pos_id
        - transaction_id
        - transaction_value
        - tenders
      properties:
        qr_code:
          type: string
          description: Loyalty program member QR code
          example: "380686852536"
        phone:
          type: string
          description: Member phone number
          pattern: '^\+?[1-9]\d{1,14}$'
          example: "+353871234567"
        vouchers:
          type: array
          description: Voucher codes that remained selected at checkout
          items:
            type: string
          example:
            - "1235/k67kmd/20251115"
        shop_id:
          type: string
          description: Shop identifier
          example: "0000323"
        timestamp:
          $ref: '#/components/schemas/PosTimestamp'
        receipt:
          type: string
          description: Receipt number
          example: "007649"
        pos_id:
          type: string
          description: POS terminal identifier
          example: "01"
        pos_user_id:
          type: string
          description: Cashier operator identifier
          example: "12"
        transaction_id:
          type: string
          description: Unique transaction identifier
          example: "doc-uuid-12345"
        transaction_value:
          type: number
          format: float
          description: Final transaction amount
          minimum: 0
          example: 13.00
        change:
          type: number
          format: float
          description: Change amount
          minimum: 0
          example: 0
        tenders:
          type: array
          description: List of payment methods
          minItems: 1
          items:
            $ref: '#/components/schemas/Tender'
        basket_items:
          type: array
          description: List of items in the basket
          items:
            $ref: '#/components/schemas/BasketItem'

    FinalizeOrderResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: boolean
          description: Request execution status
          example: true
        member_found:
          type: boolean
          description: Whether a registered loyalty member was identified
          example: true
        member_name:
          type: string
          description: Loyalty program member name
          example: "John Smith"
        points_collected:
          type: integer
          description: Number of bonus points awarded
          minimum: 0
          example: 4
        current_points:
          type: integer
          description: Current bonus points balance after award
          minimum: 0
          example: 51
        scanned_vouchers:
          type: array
          description: Final processing result for scanned vouchers
          items:
            $ref: '#/components/schemas/VoucherStatusResult'
        vouchers:
          type: array
          description: Generated vouchers, including anonymous receipt vouchers when applicable
          items:
            $ref: '#/components/schemas/IssuedVoucher'
        messages:
          type: array
          description: Lines that POS may show or print on the receipt
          items:
            type: string
          example:
            - "4 points collected"

    ErrorResponse:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
              example: "INVALID_REQUEST"
            message:
              type: string
              description: Error message
              example: "Invalid request parameters"
            details:
              type: string
              description: Additional error details
              example: "Field 'shop_id' is required"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "BAD_REQUEST"
              message: "Invalid request parameters"
              details: "Field 'shop_id' is required"

    Unauthorized:
      description: Authorization error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "UNAUTHORIZED"
              message: "Invalid or missing authentication token"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "NOT_FOUND"
              message: "Member not found"
              details: "No member found with the provided QR code or phone number"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "INTERNAL_ERROR"
              message: "Internal server error"
              details: "An unexpected error occurred"

    ServiceUnavailableError:
      description: Service unavailable error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "SERVICE_UNAVAILABLE"
              message: "Service unavailable error"
              details: "Service can't respond in SLA time (3 seconds). Please try again later."

tags:
  - name: Loyalty
    description: Loyalty program operations
