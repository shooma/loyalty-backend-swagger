openapi: 3.0.3
info:
  title: Loyalty Program API
  description: |
    🚧 🚧 🚧 🚧 🚧 🚧 🚧 🚧 🚧 
    🚧                    🚧 
    🚧 Under construction 🚧
    🚧                    🚧 
    🚧 🚧 🚧 🚧 🚧 🚧 🚧 🚧 🚧 

    API for loyalty program management.
    Used by CBE POS terminals to identify members, 
    apply discounts and vouchers, and finalize transactions.
  version: 1.0.0
  contact:
    name: Mike Shumkov (Polonez.ie)
    email: mike.shumkov@polonez.ie

servers:
  - url: https://erp.polonez.ie
    description: Production server
  - url: https://test-odoo.polonez.dev
    description: Staging server

security:
  - BearerAuth: []
    PosIdHeader: []

paths:
  /api/v1/loyalty/get-member:
    post:
      summary: Get loyalty program member data
      description: |
        Used by CBE POS when scanning QR code, entering phone number, or scanning a voucher.
        Returns member information and applicable discounts.
        
        **Notes:**
        - `voucher` can be sent when a customer voucher is scanned at the POS
        - Any combination of `qr_code`, `phone`, and `voucher` can be provided
      operationId: getMember
      tags:
        - Loyalty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMemberRequest'
            example:
              qr_code: "380686852536"
              phone: "+353871234567"
              voucher: "1235/k67kmd/20251115"
              shop_id: "0000323"
              timestamp: "2025-11-12 14:19:00"
              receipt: "007648"
              pos_id: "01"
              pos_user_id: "12"
              transaction_value: 14.00
              basket_items:
                - line_number: "1"
                  prod_code: "0000000002823"
                  product_desc: "LUNCHBOX"
                  quantity: 2
                  value: 7
                  prod_dept: "39"
                  prod_group1: "00129"
                  prod_group2: "00619"
                  vat: 1.21
                  promo_amount: 0.2
                  reduced_amount: 0
      responses:
        '200':
          description: Successful response with member data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMemberResponse'
              example:
                status: true
                member_name: "John Smith"
                points_balance: 47
                discount: 1.00
                vouchers:
                  - line_number: "1"
                    discount: 1.00
                messages:
                  - "Welcome back!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/loyalty/finalize-order:
    post:
      summary: Finalize transaction
      description: |
        Always sent after purchase completion, even if customer was not identified.
        Used for accounting, analytics and generating new vouchers.
        
        **Notes:**
        - If user is not identified, a welcome voucher can be returned for printing
        - `vouchers[].print = true` means the voucher should be printed on the receipt
      operationId: finalizeOrder
      tags:
        - Loyalty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeOrderRequest'
            example:
              qr_code: "380686852536"
              phone: "+353871234567"
              voucher: "1235/k67kmd/20251115"
              shop_id: "0000323"
              transaction_id: "doc-uuid-12345"
              timestamp: "2025-11-12 14:21:00"
              receipt: "007649"
              pos_id: "01"
              pos_user_id: "12"
              transaction_value: 13.00
              change: 0
              tenders:
                - tender_name: "CASH"
                  amount: 12.00
              basket_items:
                - line_number: "1"
                  prod_code: "0000000002823"
                  product_desc: "LUNCHBOX"
                  quantity: 2
                  value: 6
                  prod_dept: "39"
                  prod_group1: "00129"
                  prod_group2: "00619"
                  vat: 1.21
                  promo_amount: 0.2
                  reduced_amount: 0
      responses:
        '200':
          description: Successful order finalization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeOrderResponse'
              example:
                status: true
                member_name: "John Smith"
                points_collected: 4
                current_points: 51
                vouchers:
                  - print: true
                    code: "1235/k67kmd/20251115"
                    description: "Get €5 off your next order over €20!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token for authorization
    PosIdHeader:
      type: apiKey
      in: header
      name: X-Pos-Id
      description: POS terminal identifier

  schemas:
    BasketItem:
      type: object
      required:
        - line_number
        - prod_code
        - quantity
        - value
      properties:
        line_number:
          type: string
          description: Line number in the receipt
          example: "1"
        prod_code:
          type: string
          description: Product code
          example: "0000000002823"
        product_desc:
          type: string
          description: Product description
          example: "LUNCHBOX"
        quantity:
          type: number
          format: float
          description: Quantity
          minimum: 1
          example: 2
        value:
          type: number
          format: float
          description: Line item value
          minimum: 0
          example: 7.00
        prod_dept:
          type: string
          description: Product department
          example: "39"
        prod_group1:
          type: string
          description: Product group level 1
          example: "00129"
        prod_group2:
          type: string
          description: Product group level 2
          example: "00619"
        vat:
          type: number
          format: float
          description: VAT amount
          minimum: 0
          example: 1.21
        promo_amount:
          type: number
          format: float
          description: Promotional discount amount
          minimum: 0
          example: 0.2
        reduced_amount:
          type: number
          format: float
          description: Additional discount amount
          minimum: 0
          example: 0

    GetMemberRequest:
      type: object
      required:
        - shop_id
        - timestamp
        - receipt
        - pos_id
        - transaction_value
      properties:
        qr_code:
          type: string
          description: Loyalty program member QR code
          example: "380686852536"
        phone:
          type: string
          description: Member phone number
          pattern: '^\+?[1-9]\d{1,14}$'
          example: "+353871234567"
        voucher:
          type: string
          description: Scanned voucher code
          example: "1235/k67kmd/20251115"
        shop_id:
          type: string
          description: Shop identifier
          example: "0000323"
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (format YYYY-MM-DD HH:MM:SS)
          example: "2025-11-12 14:19:00"
        receipt:
          type: string
          description: Receipt number
          example: "007648"
        pos_id:
          type: string
          description: POS terminal identifier
          example: "01"
        pos_user_id:
          type: string
          description: Cashier operator identifier
          example: "12"
        transaction_value:
          type: number
          format: float
          description: Total transaction amount
          minimum: 0
          example: 14.00
        basket_items:
          type: array
          description: List of items in the basket
          items:
            $ref: '#/components/schemas/BasketItem'

    GetMemberResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: boolean
          description: Request execution status
          example: true
        member_name:
          type: string
          description: Loyalty program member name
          example: "John Smith"
        points_balance:
          type: integer
          description: Current bonus points balance
          minimum: 0
          example: 47
        discount:
          type: number
          format: float
          description: Applicable discount in main currency (Euros/Pounds etc)
          minimum: 0
          example: 1.00
        vouchers:
          type: array
          description: List of available vouchers
          items:
            type: object
            properties:
              line_number:
                type: string
                description: Line number
                example: "1"
              discount:
                type: number
                format: float
                description: Discount amount
                minimum: 0
                example: 1.00
        messages:
          type: array
          description: Messages to display to customer
          items:
            type: string
          example:
            - "Welcome back!"

    Tender:
      type: object
      required:
        - tender_name
        - amount
      properties:
        tender_name:
          type: string
          description: Payment type (CASH, CARD, etc.)
          example: "CASH"
        amount:
          type: number
          format: float
          description: Payment amount
          minimum: 0
          example: 12.00

    FinalizeOrderRequest:
      type: object
      required:
        - shop_id
        - transaction_id
        - timestamp
        - receipt
        - pos_id
        - transaction_value
        - change
        - tenders
      properties:
        qr_code:
          type: string
          description: Loyalty program member QR code
          example: "380686852536"
        phone:
          type: string
          description: Member phone number
          pattern: '^\+?[1-9]\d{1,14}$'
          example: "+353871234567"
        voucher:
          type: string
          description: Scanned voucher code
          example: "1235/k67kmd/20251115"
        shop_id:
          type: string
          description: Shop identifier
          example: "0000323"
        transaction_id:
          type: string
          description: Unique transaction identifier
          example: "doc-uuid-12345"
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (format YYYY-MM-DD HH:MM:SS)
          example: "2025-11-12 14:21:00"
        receipt:
          type: string
          description: Receipt number
          example: "007649"
        pos_id:
          type: string
          description: POS terminal identifier
          example: "01"
        pos_user_id:
          type: string
          description: Cashier operator identifier
          example: "12"
        transaction_value:
          type: number
          format: float
          description: Final transaction amount
          minimum: 0
          example: 13.00
        change:
          type: number
          format: float
          description: Change amount
          minimum: 0
          example: 0
        tenders:
          type: array
          description: List of payment methods
          minItems: 1
          items:
            $ref: '#/components/schemas/Tender'
        basket_items:
          type: array
          description: List of items in the basket
          items:
            $ref: '#/components/schemas/BasketItem'

    FinalizeOrderResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: boolean
          description: Request execution status
          example: true
        member_name:
          type: string
          description: Loyalty program member name
          example: "John Smith"
        points_collected:
          type: integer
          description: Number of bonus points awarded
          minimum: 0
          example: 4
        current_points:
          type: integer
          description: Current bonus points balance after award
          minimum: 0
          example: 51
        vouchers:
          type: array
          description: Generated vouchers (if applicable)
          items:
            type: object
            properties:
              print:
                type: boolean
                description: Whether voucher printing is required
                example: true
              code:
                type: string
                description: Voucher code
                example: "1235/k67kmd/20251115"
              description:
                type: string
                description: Voucher description
                example: "Get €5 off your next order over €20!"

    ErrorResponse:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
              example: "INVALID_REQUEST"
            message:
              type: string
              description: Error message
              example: "Invalid request parameters"
            details:
              type: string
              description: Additional error details
              example: "Field 'shop_id' is required"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "BAD_REQUEST"
              message: "Invalid request parameters"
              details: "Field 'shop_id' is required"

    Unauthorized:
      description: Authorization error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "UNAUTHORIZED"
              message: "Invalid or missing authentication token"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "NOT_FOUND"
              message: "Member not found"
              details: "No member found with the provided QR code or phone number"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            error:
              code: "INTERNAL_ERROR"
              message: "Internal server error"
              details: "An unexpected error occurred"

tags:
  - name: Loyalty
    description: Loyalty program operations
